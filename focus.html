<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Mode | DN Music</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .focus-container {
      max-width: 400px;
      width: 100%;
    }

    .timer {
      font-size: 64px;
      font-weight: bold;
      margin: 20px 0;
    }

    .focus-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .focus-btn {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #5aa8ff, #7b6cff);
      color: white;
      cursor: pointer;
    }

    .time-input {
      width: 80px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      text-align: center;
      font-size: 16px;
    }
  </style>
</head>
<body>

<div class="focus-container">
  <h1>Focus Mode</h1>
  <p>Set your own focus time</p>

  <!-- TIME INPUT -->
  <div>
    <input id="minutesInput" class="time-input" type="number" value="25" min="1">
    <span>minutes</span>
  </div>

  <div id="timer" class="timer">25:00</div>

  <div class="focus-controls">
    <button id="startBtn" class="focus-btn">Start</button>
    <button id="pauseBtn" class="focus-btn">Pause</button>
    <button id="resetBtn" class="focus-btn">Reset</button>
  </div>

  <br>

  <button onclick="goBack()" class="focus-btn">Back</button>
</div>

<!-- 🔊 ALARM SOUND -->
<audio id="alarmSound">
  <source src="assets/sfx/alarm.mp3" type="audio/mpeg">
</audio>

<script>
let time = 25 * 60;
let interval = null;

const timerEl = document.getElementById("timer");
const input = document.getElementById("minutesInput");
const alarm = document.getElementById("alarmSound");

function updateDisplay() {
  const min = Math.floor(time / 60);
  const sec = time % 60;
  timerEl.textContent = `${min}:${sec.toString().padStart(2, "0")}`;
}

function startTimer() {
  if (interval) return;

  // take user input
  if (time === 25 * 60 || time === 0) {
    const minutes = parseInt(input.value) || 25;
    time = minutes * 60;
  }

  interval = setInterval(() => {
    if (time > 0) {
      time--;
      updateDisplay();
    } else {
      clearInterval(interval);
      interval = null;

      // 🔥 ALARM
      alarm.play();

      alert("Time over! Stay strong 💪");
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(interval);
  interval = null;
}

function resetTimer() {
  const minutes = parseInt(input.value) || 25;
  time = minutes * 60;
  updateDisplay();
  pauseTimer();
}

function goBack() {
  window.history.back();
}

document.getElementById("startBtn").onclick = startTimer;
document.getElementById("pauseBtn").onclick = pauseTimer;
document.getElementById("resetBtn").onclick = resetTimer;

updateDisplay();
</script>

</body>
</html>
