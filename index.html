<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DN Focus Music</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      background: #111a2b;
    }

    .container {
      padding: 15px;
    }

    .track {
      display: flex;
      align-items: center;
      gap: 15px;
      background: #17233a;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .track img {
      width: 60px;
      height: 60px;
      border-radius: 10px;
    }

    .track-info {
      flex: 1;
    }

    .track-title {
      font-size: 14px;
      font-weight: bold;
    }

    .track-artist {
      font-size: 12px;
      color: #aaa;
    }

    .player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111a2b;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .player img {
      width: 50px;
      height: 50px;
      border-radius: 8px;
    }

    .controls button {
      background: #4ea1ff;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>🎧 DN Focus Music</header>

<div class="container" id="trackList"></div>

<div class="player">
  <img id="playerCover" src="">
  <div style="flex:1;">
    <div id="playerTitle">Select a song</div>
  </div>
  <div class="controls">
    <button onclick="playPause()">▶</button>
    <button onclick="nextTrack()">⏭</button>
  </div>
</div>

<audio id="audio"></audio>

<script>
let tracks = [];
let currentIndex = 0;
let audio = document.getElementById("audio");

fetch("data/tracks.json")
  .then(res => res.json())
  .then(data => {
    tracks = data;
    displayTracks();
  });

function displayTracks() {
  const list = document.getElementById("trackList");
  list.innerHTML = "";

  tracks.forEach((track, index) => {
    const div = document.createElement("div");
    div.className = "track";

    div.innerHTML = `
      <img src="${track.cover}">
      <div class="track-info">
        <div class="track-title">${track.title}</div>
        <div class="track-artist">${track.category}</div>
      </div>
    `;

    div.onclick = () => playTrack(index);
    list.appendChild(div);
  });
}

function playTrack(index) {
  currentIndex = index;
  const track = tracks[index];

  audio.src = track.file;
  audio.play();

  document.getElementById("playerTitle").innerText = track.title;
  document.getElementById("playerCover").src = track.cover;
}

function playPause() {
  if (audio.paused) audio.play();
  else audio.pause();
}

function nextTrack() {
  currentIndex++;
  if (currentIndex >= tracks.length) currentIndex = 0;
  playTrack(currentIndex);
}
</script>

</body>
</html>
