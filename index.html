<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DN Focus Music</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Study Music App</p>
      <h1>DN Focus Music</h1>
      <p class="subtext">Calm sounds for deep study and offline listening.</p>
    </div>
  </header>

  <main class="app-shell">
    <section class="hero-card">
      <div class="hero-copy">
        <p class="hero-label">Focus better</p>
        <h2>Your music library for students</h2>
        <p>
          Calm Piano, LoFi, Rain, Ambient, and White Noise —
          designed for study sessions.
        </p>
      </div>
    </section>

    <section class="section-head">
      <h2>All Tracks</h2>
      <p id="trackCount">Loading tracks...</p>
    </section>

    <section id="trackList" class="track-list"></section>
  </main>

  <div class="mini-player" id="miniPlayer">
    <img id="playerCover" src="assets/images/covers/lofi.jpg" alt="Now playing cover" />
    <div class="player-meta">
      <div id="playerTitle" class="player-title">Select a track</div>
      <div id="playerCategory" class="player-category">Ready to play</div>
    </div>

    <div class="player-controls">
      <button id="prevBtn" class="player-btn" type="button">⏮</button>
      <button id="playPauseBtn" class="player-btn player-btn-main" type="button">▶</button>
      <button id="nextBtn" class="player-btn" type="button">⏭</button>
    </div>
  </div>

  <audio id="audio"></audio>

  <script src="js/app.js"></script>
</body>
</html>
